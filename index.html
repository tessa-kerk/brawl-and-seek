<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Brawl &amp; Seek</title>
<meta name="theme-color" content="#1E2340">

<link rel="stylesheet" href="css/fonts.css?v=2">
<link rel="stylesheet" href="css/main.css?v=2">

<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="topbar">
      <div class="wordmark">BRAWL <span class="amp">&amp;</span> SEEK</div>
      <div class="stamp">v2 · M1</div>
    </div>

    <div id="status"></div>

    <p id="hint">
      <b>Move</b> with WASD / arrows (or drag on touch). <span class="paint">Hold still</span>
      on a surface to paint yourself in — <b>move</b> to break camo.
    </p>

    <div class="disclaimer">Fan concept by Tessa Kerk · not affiliated with Supercell</div>
  </div>

  <script src="src/config.js?v=2"></script>
  <script src="data/arena.js?v=2"></script>
  <script src="src/input.js?v=2"></script>
  <script src="src/arena.js?v=2"></script>
  <script src="src/fx.js?v=2"></script>
  <script src="src/player.js?v=2"></script>
  <script src="src/render.js?v=2"></script>
  <script src="src/game.js?v=2"></script>
</body>
</html>
